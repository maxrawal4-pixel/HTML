<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>checkbox</title>
</head>
<body>
    <form action="/action">
        <label for="checkbox">checked</label>
        <input type="checkbox" id="checkbox" value="checked"/>
        <br>
        <label for="age 18+">18+</label>
        <input type="checkbox" id="age 18+" value="checked">
        <br>
        <label for="i am a student">i am a student</label>
        <input type="checkbox" id="i am a student" value="checked"/>
        <button type="submit">submit</button>
    </form>
</body>
</html>
