<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>table in html</title>
</head>
<body>
    <table  border="black">
    <caption>food menu</caption>
    <thead>
        <tr>
        <th rowspan="2">data</th>
        <th colspan="2">price</th>
    </tr>
    <tr>
        <th>inr</th>
        <th>usd</th>
    </tr>
    </thead>
    <tbody>
        <tr>
        <td>samosa</td>
        <td>20</td>
        <td>0.45</td>
    </tr>
    <tr>
        <td>dosa</td>
        <td>30</td>
        <td>0.60</td>
    </tr>
    <tr>
        <td>pizza</td>
        <td>45</td>
        <td>0.90</td>
    </tr>
    <tr>
        <td>root</td>
        <td>50</td>
        <td>1.00</td>
    </tr>
    </tbody>
    <tfoot>
        <tr>
            <td>total</td>
            <td>145</td>
        </tr>
    </tfoot>
</table>
</body>
</html>
