<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="container">
    <h1>Login</h1>
    <h2>Login and Password</h2>

    <form action="/action">
        <label>Email</label><br>
        <input type="text" placeholder="Enter Email"><br><br>

        <label>Password</label><br>
        <input type="password" placeholder="Password"><br><br>

        <button type="submit">Login</button>
    </form>
</div>

<style>
    .container {
        width: 300px;
        margin: 50px auto;
        text-align: center;
    }

    form {
        text-align: left;
    }

    input {
        width: 100%;
        padding: 8px;
        box-sizing: border-box;
    }

    button {
        width: 100%;
        padding: 10px;
    }

    h1 {
        margin-bottom: 5px;
    }

    h2 {
        margin-top: 0;
        margin-bottom: 20px;
    }
</style>
</body>
</html>
